#   ==============  레포지토리 환경 변수  ==============
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,  AWS_DEFAULT_REGION       # CLI
#   AWS_ECR_REPO, AWS_ECR_NAME, AWS_ECR_NAME_DEV                        # ECR
#   K8S_REPO, K8S_API_TOKEN, GIT_EMAIL                                  # DS 라이브, 데브
#   =================================================
#  내용
#   ============== INFRA API 토큰  ==============
#   Expires: Mar 26, 2027
#   =================================================
image: atlassian/default-image:5

definitions:
  steps:
    # ── CI 공통 스텝 (YAML 앵커) ──
    - step: &lint-audit
        name: CI - Lint & Security Audit
        image: node:20
        caches:
          - node
        script:
          - npm ci
          - npm run lint
          # - npm run {USER_TEST}

    - step: &build
        name: CI - Build
        image: node:20
        caches:
          - node
        script:
          - npm ci
          - npm run build
        artifacts:
          - dist/**

    - step: &docker-smoke
        name: CI - Docker Build & Run
        services:
          - docker
        script:
          - docker build -t ci-smoke-test:latest .
          - docker run --rm ci-smoke-test:latest echo "Container started successfully"

pipelines:
  # =============  CI: main 브랜치 (머지 후)  =============
  branches:
    # main:
    feature/infra:
      - parallel:
          - step: *lint-audit
          - step: *build
      # - step: *docker-smoke

  # =============  CI: PR (main 대상)  =============
  pull-requests:
    '**':
      - parallel:
          - step: *lint-audit
          - step: *build
      # - step: *docker-smoke

  # =============  CD: 태그 기반 배포  =============
  tags:
    'dev-*.*.*':
      - step:
          name: Build & Push Image to ECR (DEV)
          services:
            - docker
          script:
            - docker build -t $AWS_ECR_NAME_DEV:$BITBUCKET_TAG -t $AWS_ECR_NAME_DEV .
            - docker tag $AWS_ECR_NAME_DEV:$BITBUCKET_TAG $AWS_ECR_REPO/$AWS_ECR_NAME_DEV:$BITBUCKET_TAG
            - docker tag $AWS_ECR_NAME_DEV:$BITBUCKET_TAG $AWS_ECR_REPO/$AWS_ECR_NAME_DEV:latest
            - pipe: atlassian/aws-ecr-push-image:2.6.0
              variables:
                AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION
                IMAGE_NAME: $AWS_ECR_NAME_DEV
                TAGS: "$BITBUCKET_TAG latest"
      - step:
          name: K8S GitOps Update (DEV)
          script:
            - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod +x /usr/local/bin/yq
            - git config --global user.email "$GIT_EMAIL"
            - git config --global user.name "Bitbucket Pipeline"
            - git clone https://x-token-auth:$K8S_API_TOKEN@bitbucket.org/$K8S_REPO.git k8s-dir
            - cd k8s-dir
            - yq e '.image.tag = env(BITBUCKET_TAG)' -i ./helm-charts/market/market-api/values-dev.yaml
            - git add .
            - 'git commit -m "chore: update market-api dev image tag to $BITBUCKET_TAG"'
            - |
              n=0
              until [ "$n" -ge 10 ]
              do
                git pull --rebase origin main && git push origin main && break
                n=$((n+1))
                echo "Push failed. Retrying in 3 seconds... (Attempt $n)"
                sleep 1
              done
    '*.*.*':
      - step:
          name: Build & Push Image to ECR (PROD)
          services:
            - docker
          script:
            - docker build -t $AWS_ECR_NAME:$BITBUCKET_TAG -t $AWS_ECR_NAME .
            - docker tag $AWS_ECR_NAME:$BITBUCKET_TAG $AWS_ECR_REPO/$AWS_ECR_NAME:$BITBUCKET_TAG
            - docker tag $AWS_ECR_NAME:$BITBUCKET_TAG $AWS_ECR_REPO/$AWS_ECR_NAME:latest
            - pipe: atlassian/aws-ecr-push-image:2.6.0
              variables:
                AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION
                IMAGE_NAME: $AWS_ECR_NAME
                TAGS: "$BITBUCKET_TAG latest"
      - step:
          name: K8S GitOps Update (PROD)
          script:
            - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod +x /usr/local/bin/yq
            - git config --global user.email "$GIT_EMAIL"
            - git config --global user.name "Bitbucket Pipeline"
            - git clone https://x-token-auth:$K8S_API_TOKEN@bitbucket.org/$K8S_REPO.git k8s-dir
            - cd k8s-dir
            - yq e '.image.tag = env(BITBUCKET_TAG)' -i ./helm-charts/market/market-api/values-prod.yaml
            - git add .
            - 'git commit -m "chore: update market-api prod image tag to $BITBUCKET_TAG"'
            - |
              n=0
              until [ "$n" -ge 10 ]
              do
                git pull --rebase origin main && git push origin main && break
                n=$((n+1))
                echo "Push failed. Retrying in 3 seconds... (Attempt $n)"
                sleep 1
              done
