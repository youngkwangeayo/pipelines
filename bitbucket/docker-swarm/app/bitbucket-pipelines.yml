#   ==============  레포지토리 환경 변수  ==============
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,  AWS_DEFAULT_REGION       # CLI
#   AWS_ECR_NAME_DEV, AWS_ECR_REPO_DEV                                          # ECR
#   INFRA_REPO, INFRA_API_TOKEN                                         # DS 라이브, 데브
#   =================================================
#  내용
#   ============== INFRA API 토큰  ==============
#   Expires: Feb 12, 2027
#   =================================================
image: atlassian/default-image:2

pipelines:
  tags:
    '*.*.*-dev-*':
      - step:
          name: 🏗️ Build & Push Image to ECR (DEV)
          services:
            - docker
          script:
            # Docker 이미지 빌드
            - docker build -t $AWS_ECR_NAME_DEV:$BITBUCKET_TAG -t $AWS_ECR_NAME_DEV .
            # ECR에 REPO 태그 지정
            - docker tag $AWS_ECR_NAME_DEV:$BITBUCKET_TAG $AWS_ECR_REPO_DEV/$AWS_ECR_NAME_DEV:$BITBUCKET_TAG
            - docker tag $AWS_ECR_NAME_DEV:$BITBUCKET_TAG $AWS_ECR_REPO_DEV/$AWS_ECR_NAME_DEV:latest
            # ECR에 푸시
            - pipe: atlassian/aws-ecr-push-image:2.6.0
              variables:
                AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID 
                AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION 
                IMAGE_NAME: $AWS_ECR_NAME_DEV
                TAGS: "$BITBUCKET_TAG latest"
      - step:
          name: Deploy to Docker Swarm (DEV)
          script:
            - |
                curl -sS -D - \
                  -H "Authorization: Bearer $INFRA_API_TOKEN" \
                  -H "Content-Type: application/json" \
                  -X POST "https://api.bitbucket.org/2.0/repositories/$INFRA_REPO/pipelines/" \
                  -d "{
                    \"target\": {
                      \"type\": \"pipeline_ref_target\",
                      \"ref_type\": \"branch\",
                      \"ref_name\": \"main\",
                      \"selector\": { \"type\": \"custom\", \"pattern\": \"deploy-app\" }
                    },
                    \"variables\": [
                      { \"key\": \"APP_NAME\", \"value\": \"sm-api\" },
                      { \"key\": \"IMAGE_TAG\", \"value\": \"$BITBUCKET_TAG\" },
                      { \"key\": \"ENV\", \"value\": \"dev\" },
                      { \"key\": \"STACK\", \"value\": \"signage-manager\" }
                    ]
                  }"
