#  ==============  레포지토리 환경 변수  ==============
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,  AWS_DEFAULT_REGION       # CLI
#   AWS_ECR_REPO, AWS_ECR_NAME                                          # ECR 라이브
#   AWS_ECR_REPO_DEV, AWS_ECR_NAME_DEV                                  # ECR 데브
#   K8S_REPO, K8S_API_TOKEN          GIT_EMAIL                          # K8S 라이브, 데브
# =================================================
#  내용
# =================================================
image: atlassian/default-image:2

pipelines:
  tags:
    '*.*.*-dev-*':
      - step:
          name: 🏗️ Build & Push Image to ECR (DEV)
          services:
            - docker
          script:
            # Docker 이미지 빌드
            - docker build -t $AWS_ECR_NAME_DEV:$BITBUCKET_TAG -t $AWS_ECR_NAME_DEV .
            # ECR에 REPO 태그 지정
            - docker tag $AWS_ECR_NAME_DEV:$BITBUCKET_TAG $AWS_ECR_REPO_DEV/$AWS_ECR_NAME_DEV:$BITBUCKET_TAG
            - docker tag $AWS_ECR_NAME_DEV:$BITBUCKET_TAG $AWS_ECR_REPO_DEV/$AWS_ECR_NAME_DEV:latest
            # ECR에 푸시
            - pipe: atlassian/aws-ecr-push-image:2.6.0
              variables:
                AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID 
                AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION 
                IMAGE_NAME: $AWS_ECR_NAME_DEV
                TAGS: "$BITBUCKET_TAG latest"
      - parallel:
        - step:
            name: CMS Deploy Trigger k8s pipe (DEV)
            script:
              # 얌파싱 패키지 다운
              - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod +x /usr/local/bin/yq
              
              
              - git config --global user.email "$GIT_EMAIL"
              - git config --global user.name "Bitbucket Pipeline"
              - git clone https://x-token-auth:$K8S_API_TOKEN@bitbucket.org/$K8S_REPO.git k8s-dir
              - cd k8s-dir

              - yq e '.image.tag = env(BITBUCKET_TAG)' -i ./helm-charts/cms/values-dev.yaml
              
              - git add .
              - 'git commit -m "chore: update cms dev image tag to $BITBUCKET_TAG"'
              - |
                n=0
                until [ "$n" -ge 10 ]
                do
                  git pull --rebase origin main && git push origin main && break
                  n=$((n+1))
                  echo "Push failed. Retrying in 3 seconds... (Attempt $n)"
                  sleep 1
                done
    '*.*.*':
        - step:
            name: 🏗️ Build & Push Image to ECR (PROD)
            services:
              - docker
            script:
              # Docker 이미지 빌드
              - docker build -t $AWS_ECR_NAME:$BITBUCKET_TAG -t $AWS_ECR_NAME .
              # ECR에 REPO 태그 지정
              - docker tag $AWS_ECR_NAME:$BITBUCKET_TAG $AWS_ECR_REPO/$AWS_ECR_NAME:$BITBUCKET_TAG
              - docker tag $AWS_ECR_NAME:$BITBUCKET_TAG $AWS_ECR_REPO/$AWS_ECR_NAME:latest
              # ECR에 푸시
              - pipe: atlassian/aws-ecr-push-image:2.6.0
                variables:
                  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID 
                  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                  AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION 
                  IMAGE_NAME: $AWS_ECR_NAME
                  TAGS: "$BITBUCKET_TAG latest"
        - parallel:
          - step:
              name: CMS Deploy Trigger k8s pipe (PROD)
              script:
                # 얌파싱 패키지 다운
                - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod +x /usr/local/bin/yq
                
                
                - git config --global user.email "$GIT_EMAIL"
                - git config --global user.name "Bitbucket Pipeline"
                - git clone https://x-token-auth:$K8S_API_TOKEN@bitbucket.org/$K8S_REPO.git k8s-dir
                - cd k8s-dir

                - yq e '.image.tag = env(BITBUCKET_TAG)' -i ./helm-charts/cms/values-prod.yaml
                
                - git add .
                - 'git commit -m "chore: update cms prod image tag to $BITBUCKET_TAG"'
                - |
                  n=0
                  until [ "$n" -ge 10 ]
                  do
                    git pull --rebase origin main && git push origin main && break
                    n=$((n+1))
                    echo "Push failed. Retrying in 3 seconds... (Attempt $n)"
                    sleep 1
                  done