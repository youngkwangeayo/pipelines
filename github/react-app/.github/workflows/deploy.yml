name: Deploy to AWS S3 and CloudFront

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드를 가상 서버로 가져옴 (필수!)
      - name: Checkout
        uses: actions/checkout@v3

      # 2. 노드 버전 설정
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3. 더 빠르고 안정적인 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4. 빌드
      - name: Build
        run: npm run build

      # 5. 백업용 Zip 파일 생성 (커밋 해시 포함)
      - name: Create Build Zip
        run: |
          mkdir -p build-zip-temp
          zip -r build-zip-temp/build-${{ github.sha }}.zip dist/

      # 6. S3 배포 (산출물)
      - name: S3 Deploy - Web Content
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: 'dist'
          DEST_DIR: 'hr-app'

      # 7. S3 배포 (Zip 백업)
      - name: S3 Deploy - Zip Artifact
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: 'build-zip-temp'
          DEST_DIR: 'build-zip'

      # 8. 모든 경로 무효화 (/*)
      - name: CloudFront Invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DIST_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2